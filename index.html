<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGPA Calculator - 5th Sem CSE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f4f4f4;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    p.subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: -10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #4a90d9;
      color: white;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    input[type="number"] {
      width: 70px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    button {
      display: block;
      margin: 20px auto 0;
      padding: 10px 30px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    #result {
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 16px 20px;
      margin-top: 20px;
      font-size: 15px;
    }

    #result h3 {
      margin: 0 0 10px;
      color: #333;
    }

    .fail-msg {
      color: red;
      font-weight: bold;
    }

    .pass-msg {
      color: green;
      font-weight: bold;
    }

    .error-msg {
      color: red;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h2>SGPA Calculator</h2>
  <p class="subtitle">5th Semester — CSE (VTU)</p>

  <table>
    <thead>
      <tr>
        <th>Subject Code</th>
        <th>Credits</th>
        <th>Marks (0–100)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>BCS501</td>
        <td>4</td>
        <td><input type="number" id="s1" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BCS502</td>
        <td>4</td>
        <td><input type="number" id="s2" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BCS503</td>
        <td>4</td>
        <td><input type="number" id="s3" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BAIL504</td>
        <td>1</td>
        <td><input type="number" id="s4" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BCD586</td>
        <td>2</td>
        <td><input type="number" id="s5" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BRMK557</td>
        <td>3</td>
        <td><input type="number" id="s6" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BCS508</td>
        <td>1</td>
        <td><input type="number" id="s7" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
      <tr>
        <td>BAI515A</td>
        <td>3</td>
        <td><input type="number" id="s8" min="0" max="100" placeholder="e.g. 75"></td>
      </tr>
    </tbody>
  </table>

  <button onclick="calculate()">Calculate SGPA</button>

  <div id="result" style="display:none;"></div>

  <script>
    const credits = [4, 4, 4, 1, 2, 3, 1, 3];
    const codes   = ['BCS501','BCS502','BCS503','BAIL504','BCD586','BRMK557','BCS508','BAI515A'];
    const total_credits = 22;

    function getGrade(m) {
      if (m >= 90) return 10;
      if (m >= 80) return 9;
      if (m >= 70) return 8;
      if (m >= 60) return 7;
      if (m >= 50) return 6;
      if (m >= 40) return 5;
      if (m >= 30) return 4;
      if (m >= 20) return 3;
      if (m >= 10) return 2;
      return 0;
    }

    function calculate() {
      const ids = ['s1','s2','s3','s4','s5','s6','s7','s8'];
      const marks = [];
      const resultDiv = document.getElementById('result');

      for (let i = 0; i < ids.length; i++) {
        const val = document.getElementById(ids[i]).value;
        const num = parseInt(val);
        if (val === '' || isNaN(num) || num < 0 || num > 100) {
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = '<p class="error-msg">Please enter valid marks (0 to 100) for all subjects.</p>';
          return;
        }
        marks.push(num);
      }

      // Check for failed subjects (marks < 35)
      const failedSubjects = [];
      for (let i = 0; i < marks.length; i++) {
        if (marks[i] < 35) {
          failedSubjects.push(codes[i]);
        }
      }

      // Calculate SGPA
      let gradeSum = 0;
      for (let i = 0; i < marks.length; i++) {
        gradeSum += getGrade(marks[i]) * credits[i];
      }
      const sgpa = (gradeSum / total_credits).toFixed(2);

      // Build result HTML
      let html = '<h3>Result</h3>';
      html += '<p>SGPA: <strong>' + sgpa + '</strong></p>';

      if (failedSubjects.length > 0) {
        html += '<p class="fail-msg">FAIL — You have scored below 35 in: ' + failedSubjects.join(', ') + '</p>';
      } else {
        let grade = '';
        if (sgpa >= 9)      grade = 'A+';
        else if (sgpa >= 8) grade = 'A';
        else if (sgpa >= 7) grade = 'B';
        else if (sgpa >= 6) grade = 'C';
        else if (sgpa >= 5) grade = 'D';
        else                grade = 'E';

        html += '<p class="pass-msg">Grade: ' + grade + ' — All subjects cleared!</p>';
      }

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = html;
    }
  </script>

</body>
</html>
